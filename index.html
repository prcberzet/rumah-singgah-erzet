<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rumah Singgah Rumah Zakat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .room-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; }
        .room-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; transition: all 0.2s; background: #fdfdfd; font-size: 16px; }
        @media (min-width: 768px) { input, select, textarea { font-size: 14px; } }
        input:focus, select:focus, textarea:focus { border-color: #f97316; outline: none; box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1); background: #fff; }
        .photo-container { position: relative; width: 100%; height: 160px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Indikator Cloud Sync -->
    <div id="sync-indicator" class="fixed bottom-4 left-4 bg-white/90 backdrop-blur px-4 py-2 rounded-full shadow-lg border border-slate-200 flex items-center gap-2 z-50 transition-all duration-300 hidden">
        <i id="sync-icon" class="fa-solid fa-circle-notch fa-spin text-blue-500"></i> 
        <span id="sync-text" class="text-[10px] font-black text-slate-700 tracking-widest uppercase">Menghubungkan...</span>
    </div>

    <!-- PORTAL LOGIN -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-50 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[32px] shadow-2xl max-w-sm w-full border border-slate-100">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl shadow-inner">
                    <i class="fa-solid fa-house-chimney-medical"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800">Masuk Portal</h2>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Monitoring Rumah Singgah</p>
            </div>
            
            <form id="login-form" class="space-y-5" onsubmit="return handleLogin(event)">
                <div id="login-error-msg" class="hidden text-[11px] text-red-600 font-bold bg-red-50 p-3 rounded-xl border border-red-100 text-center"></div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1 block">Username</label>
                    <input type="text" id="login-user" required placeholder="Contoh: username" class="bg-slate-50 border-slate-200 focus:bg-white" autocapitalize="none" autocorrect="off" autocomplete="off" spellcheck="false">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1 block">Password</label>
                    <div class="relative">
                        <input type="password" id="login-pass" required placeholder="***" class="bg-slate-50 border-slate-200 focus:bg-white w-full pr-10">
                        <button type="button" onclick="togglePassword('login-pass', 'login-pass-icon')" class="absolute inset-y-0 right-0 px-3 flex items-center text-slate-400 hover:text-slate-600 transition-colors focus:outline-none">
                            <i id="login-pass-icon" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-orange-600 transition-colors shadow-lg shadow-slate-900/20 mt-2 tracking-wider">LOGIN</button>
            </form>

            <div class="mt-6 bg-blue-50 p-4 rounded-xl border border-blue-100 text-center">
                <p class="text-[11px] text-blue-800 font-medium"><i class="fa-solid fa-circle-info mr-1"></i> Jika lupa sandi, ketik darurat: <br>User: <strong>admin</strong> | Pass: <strong>admin</strong></p>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="max-w-7xl mx-auto hidden">
        <div class="flex flex-col md:flex-row md:items-start justify-between gap-6 mb-8">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight flex flex-col md:flex-row md:items-center gap-1 md:gap-3">
                    <span>Rumah Singgah</span>
                    <span class="text-orange-600">Rumah Zakat</span>
                </h1>
                <div class="flex items-center gap-2 mt-2" id="role-badge-container"></div>
            </div>
            
            <div class="flex flex-col items-start md:items-end gap-2" id="header-profile-section">
                <button onclick="openBranchProfile()" class="text-xs font-black text-orange-600 bg-orange-50 hover:bg-orange-100 transition-colors px-5 py-2.5 rounded-full uppercase tracking-wider flex items-center gap-2 shadow-sm border border-orange-100 cursor-pointer">
                    <i class="fa-solid fa-house-medical"></i> PROFIL: <span id="active-branch-label">-</span>
                </button>
                <button onclick="logout()" class="text-[10px] font-bold text-red-500 hover:text-red-700 flex items-center gap-1 uppercase tracking-wider px-2 cursor-pointer">
                    <i class="fa-solid fa-right-from-bracket"></i> Keluar
                </button>
            </div>
        </div>

        <div class="mb-6 overflow-x-auto pb-2" id="branch-nav-container"></div>

        <div class="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200 mb-6 md:mb-8 flex flex-col md:flex-row justify-start md:justify-end gap-4">
            <div class="flex flex-wrap items-center justify-start md:justify-end gap-3 w-full">
                <div class="bg-slate-50 py-2 px-4 rounded-xl border border-slate-100 flex items-center gap-3">
                    <div class="bg-orange-100 p-2 rounded-lg text-orange-600">
                        <i class="fa-solid fa-bed"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase font-black tracking-wider">Terisi</p>
                        <div class="flex items-baseline gap-1">
                            <p id="total-terisi" class="text-xl font-black text-slate-800 leading-none">0</p>
                            <span id="total-kamar" class="text-xs font-bold text-slate-400">/ 0</span>
                        </div>
                    </div>
                </div>
                <button onclick="openHistory()" class="bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 font-bold py-2.5 px-5 rounded-xl flex items-center gap-2 transition shadow-sm text-sm">
                    <i class="fa-solid fa-history text-orange-500"></i> Riwayat
                </button>
            </div>
        </div>

        <div id="room-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <!-- Modal Tambah Lokasi -->
    <div id="add-location-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white rounded-[32px] max-w-lg w-full p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-2xl font-black text-slate-800">Tambah Lokasi Baru</h2>
                    <p class="text-xs text-orange-500 font-bold uppercase">Cabang Rumah Singgah</p>
                </div>
                <button onclick="closeModal('add-location-modal')" class="bg-slate-100 hover:bg-slate-200 w-8 h-8 rounded-full transition flex justify-center items-center">
                    <i class="fa-solid fa-xmark text-slate-500"></i>
                </button>
            </div>
            <form id="add-location-form" class="space-y-4">
                <div id="add-loc-error" class="hidden text-[11px] text-red-600 font-bold bg-red-50 p-3 rounded-xl border border-red-100"></div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Nama Cabang / Kota</label>
                    <input type="text" id="loc-nama" required placeholder="Contoh: Bandung">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Alamat Lengkap</label>
                    <textarea id="loc-alamat" required placeholder="Alamat lengkap lokasi..." rows="2" class="resize-none"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Penanggung Jawab</label>
                        <input type="text" id="loc-pj" required placeholder="Nama PJ">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">No Telepon</label>
                        <input type="tel" id="loc-telp" required placeholder="08...">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Jumlah Kam
